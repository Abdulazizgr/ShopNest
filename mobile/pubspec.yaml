name: shopnest
description: "ShopNest - E-commerce Mobile App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.3.0
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  fluttertoast: ^8.2.12
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.1
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
